front:
  text: 序泰西之學苦思力索不極其元不止每一藝出令人駴絶獨中國醫經以陰陽五行之理合之人身確乎不易而西醫偏不之信遺氣化而究形質夫大撓作甲子於何始於何終近乎妄矣而正月幾日得辛則農家亦知其不爽也任吾剖視莫雞豚若而其化飲食之火何在未有能指者也以此理語西醫西醫未必強辨況西人之智慧何遜華人居中土治中學後必有通中醫而元之又元上啓黃帝九籥者吾華人當有以贊之不當先自貶以誤之嗟乎醫學至今日誠無解於西人之垢矣針法之真傳已失即素問靈樞本草經傷寒論金匱要略等於四書五經而讀之者牛毛解之者麟角其有著述行世而或文辭朗鬯中多紕繆或稗敗剽竊復為大言以此斯人人不能辨更有偏於溫熱偏於寒涼後人奉之為師承者此醫學所以日敝而疵癘夭札之無術以救也大抵論病可以辭飾而方解不能虛構方解之切究其所以然無毫髮疏舛者方書中不多見國朝大醫無過葉天士徐洄溪尤在涇三家而葉注本事方多羼以入某經某經無當之言徐輯傷寒類方蘭臺軌範有碎錦而無全璧尤注傷寒論金匱要略於方解多簡而渾余欲補前人之關撰為一書而以衰齡事冗因循不果會孫倩程生仲來問醫業於余恆以為請余曰奢願恐不可償矣雖然聞一知幾視人之悟若何耳多言何為爰舉六氣感證與古方之切合者竭數月之功輯為要義一編以授之且曰區區此數不足為檢方治病之用毋示外人供覆瓿也生曰集中注拙似者百餘十條悉注家屐齒所未經發余蘊訂躗言不特津逮來者抑且有功前哲即西醫見之亦必謂中國格致之別有機悟也蓋付之剞氏以公同好乎余曰諾哉光緒戊戌正月鹿起山人周岩自書于越城穆聯巷寓齊時年六十有七
