body:
  text: 凡例醫不明傷寒不可以治百病以百病不離乎六經而六經之證惟傷寒傳變出入最易混淆最宜詳審能洞徹於傷寒尚有何證之不易知然南陽傷寒論淵微精奧必得將全書熟讀深求方有悟入遇病不至迷惑若撮其大略聊備一類不徒贅如懸瘤抑且誤人祈向故本集不列傷寒一門欲學者以全書究傷寒誠重之也外感之證不出風寒暑濕燥火六氣曰傷寒者對雜證而言之若對內傷而言則傷寒亦同為外感傷寒之方多可施於六氣六氣之病亦可統於傷寒難經傷寒有五是故欲明傷寒當先詳六氣六氣者傷寒之先河也傷寒一經訣治變狀遂多且有合病並病與兩感諸下同之證外感雖一至如是然病隨藥變感以時增或爽有內傷或勾起風疾無始終不易之情無一法可該之理本集但為學者喤引故止就六氣之初感者辨論之余則概不暇及六氣而止感一氣則有一氣之病為風為寒為暑為濕為燥為火復以兩氣則有兩氣之病為風溫為風濕為濕溫此即以六氣之名為病名者其他雖感六氣而別有病名不純屬外感如痙如痹如疸如痿躄如霍亂如痎瘧如咳嗽瀉痢之類若一律編入反致六氣之本病亦滋眩惑則非愚著是集之意矣茲故從略中風中寒中字非病因而稱名特重故別列之不以隸風寒兩門庶學者知其為大證而謗之於心也暑火二氣之病最夥然後世稱名取雜其中不過稍分微甚或竟名異而實不異本集於外感伏氣之溫熱病詳列暑火兩門外其寒疫冬溫與燥熱濕熱之疫癘但熱無寒之溫瘧病因各異並附見於暑火濕溫三門學者但就此數證潛心參究渠矱已具隅反不難故如溫毒溫疫時行大頭諸名目概棄之以省枝節非掛漏也凡集中義理有愚所創護用以質海內名賢者皆末注拙似二字若無關切要雖拙似不注凡說解出自前賢者醫所共知概不加注其或於文內提明某氏云者以義有所擊勢不得略也凡集中有敘入黃帝內經神農本經名醫別録傷寒論金匱要略及前人醫集等語而不曰某書云者亦以醫家習見且冀免於繁蕪絶非有臆造也藥名不用本字而以他字代者或取省筆或取易識相衍已久今亦從欲不復改正風集說本集不列傷寒一門已詳凡例此所謂風專主傷風之風甚於寒者風所來之方不同亦隨時令為寒溫惟經云邪之所湊其氣必虛又云風從外入令人振寒即使但感於風亦必腠理開而灑然寒其兼挾寒者無論矣考古以辛溫發散為治理自莫易若已傳陽明化熱與所感為溫熱之風則不在此例拙擬傷寒論之中風猶今之謂傷風不過有輕重之分故桂枝湯於四時傷風亦有宜者昔賢固言之矣然必汗自出而脈浮弱始為切合傷風又稱感冒凡偶感風寒頭痛發熱咳嗽涕出即是內經云至下之地春菊常在故東南卑濕之區傷風最多徐洄溪有傷風難治論尤在涇則引內經勞風法在肺下一段以證傷風不解便成勞之諺足見傷風難治自古已然惡風固必惡寒惟傷風之惡風惡寒只在皮膚之表非若傷寒之惡寒近烈火而不減惡風處密室而亦畏也傷風傷寒同為太陽表證太陽證必頭痛不痛非是傷寒治之得宜六七日間可愈傷風而誤治為害亦甚巨直作平等觀可矣傷寒偏死下虛人是固然矣傷風而下虛亦每有數日而斃者誤入麻黃湯即與傷寒戴陽證相似前人醫案具在可取而按也有一種似傷風而實非傷風乃下元久虧腎水泛濫以為痰浮陽沖激而成嗽也方解桂枝湯治風傷太陽脈浮緩頭痛發熱嗇嗇惡寒淅淅惡風汗自出桂枝三兩芍藥三兩甘草二兩炙生薑三兩大棗十二枚擘上五味㕮咀以水七升微火煮取三升去滓適寒溫服服已須臾飲熱稀粥以助藥力溫覆令一時許遍身漐漐微似有汗者佳不可令如水流漓病必不除禁生冷黏滑肉面五辛酒酪及臭惡等物用桂枝發散邪氣即以芍藥攝養津氣炙甘草合桂枝之辛足以攘外合芍藥之酸足以安內生薑大棗甘辛相合補益營衛亦所以助正氣去邪氣也飲熱稀粥與溫覆取微汗切不可忽桂枝湯之驅風能辨脈證識本草得仲景法者用之無不神妙粗工畏而避之今日幾成廣陵散矣學者何可不於此問津九味羌活湯治四時感冒發散之通劑羌活防風川芎生芷細辛蒼朮黃芩甘草生地此方分兩當因病之輕重加減故不為一定之數上加生薑三片蔥白三莖水煎服張元素立此方以代麻黃諸湯統治四時感冒不正之氣後人多韙之陶節庵謂有表證不分有汗無汗皆可用並有加減法按方內除生地黃芩俱辛溫發散之藥雖各經咸到而於風寒濕之在太陽必須汗解者用之最得方有風藥無熱藥今取以為治傷風之劑拙擬方無深義惟黃芩為少陽藥而於太陽亦多有用者人身上升之氣由少陽而出風寒鬱之即成壯火退壯火自須佐以黃芩然非板法遇毗陰之體審無熱象即可不加至生地系純陰血藥頗掣發散之肘徐洄溪云不若易當歸為佳當歸治風寒自勝於挾濕挾熱者亦非所宜拙擬參蘇飲治感冒風寒頭痛發熱憎寒咳嗽涕唾稠黏胸膈滿悶脈弱無汗人參蘇葉乾葛前胡橘紅枳殼茯苓半夏各八兩桔梗木香甘草各五兩生薑五片大棗一枚上十三味水煎熱服取汗風寒由皮毛而入發熱憎寒頭痛咳嗽遂相因而至蘇葛前胡所以解肌涕唾稠黏胸膈滿悶由飲盛而氣逆二陳所以化飲更為寬中開肺以策應之則有枳殼桔梗益氣強志調營衛以整頓之則有人參木香薑棗如是而禦侮之術周脈自強汗自出矣拙擬人參能固表止汗何以無汗反用之此則可與仲景桂枝湯並參其理焉桂枝湯名為表劑而藥非表藥桂枝白芍且足以閉汗飲粥溫覆遂能微汗而愈者蓋病本惡風自汗自汗則衛氣外泄不與營和若更發其汗風必熾而不熄欲風之熄非化自汗而微汗不可桂枝湯所以調營衛而驅風而芍藥一味又能攝外泄之衛氣轉而就營營衛何能不諧自汗之邪何能不去而正復之汗何能不生人參亦非發汗之藥故仲景發汗方中絶不一用然脈沉遲則用之脈不出則用之桂枝湯證為自汗故施以桂芍此證為無汗故宜於蘇葛因脈弱而測知其中虛汗為心液人參補心液而生脈非加人參則汗亦不出此用止汗之藥以發汗與桂枝湯隱有同揆然而桂枝湯尤微妙不可思議矣拙擬以上三方皆內經所謂風司於地清反勝之治以酸溫佐以苦甘以辛平之者柯韻伯以桂枝湯證為中鼓動之陽風吳鞠通駮之甚是然以辛溫為治風之變法不知辛溫與辛涼皆本內經用各有當汪訒庵又誤以桂枝湯為辛涼皆由不曉內經邪氣反勝之義說詳後燥門蓋感風而惡寒者挾太陽寒水之氣而來所謂清反勝之也金為次寒而肺與膀胱皆主身之外衛病每相因故清勝亦即寒勝偏主寒涼家盍即內經與古方之去取反覆思之拙擬中風集說風之傷人其病各異其名不同而要以傷風中風二者最為安危所繫傷風輕而勢緩誤治則為害亦巨中風重而勢急治得其宜則轉機亦易此仲景所以分列於傷寒論金匱兩書也拙擬中風何以得之蓋風自虛鄉來為虛風亦謂虛邪風適與人身之虛兩虛相感於是中絡中經中腑中臟而有猝暴之疾若風非虛邪人非甚虛但為傷風而已陰虛陽虛之內風亦為虛風與自虛鄉來之虛風不同宜分辨虛風之來每挾身中素有之邪或火或氣或痰相因為患河間主火東垣主氣丹溪主痰皆不免於偏然合而觀之則於中風一證思過半矣金匱風之為病二段語語金針必宜熟玩河間謂中腑多著四肢中臟多滯九竅即於理有未足喻西昌之論中風可按也喻氏謂侯氏黑散於驅風之中兼填空竅俞東扶譏其好奇而喻氏實從內經金匱細意探討發出精義不足為喻氏病也喻氏論偏枯猝倒皆由陽氣虛餒所致亦從內經金匱反覆闡明有功醫學且非偏重溫補而置祛風清火消痰宣竅諸法於不講其書具在非愚之阿所好也北人多屬寒南人多屬火此徐洄溪之言著一多字甚妙前人南醫好用陽藥者不可勝舉劉河間北醫而以善用清涼名家可見北人非無屬火南人非無屬寒預存成見偏重一面者不可與言至道拙擬金匱侯氏黑散風引湯兩方非學識超卓未可輕用然其方一治寒一治熱屹然對峙實為後世偏熱偏寒之醫治中風者下一針砭拙擬資生經云中風由心腹中先有大熱而後作後人驗之良信竊謂此亦類中非真中乃若多欲勞損之人一旦真陽發越亦有心腹中有大熱者急與回陽大劑間有得生與類中之熱相似而實不同粗工不知細辨往往致誤拙擬張石頑云中風猝倒必手足搐引喉間痰涎壅盛甚則聲如拽鋸斯為中風之真候南方多類中宜用河間地黃飲子者頗多不因外感不闌入徐洄溪云凡古聖定病之名必指其實名曰中風其為屬風可知既為風病則治病之方必以治風為本故唐以前之方皆多用風藥而因證增減蓋以風入經絡則內風與外風相煽以致痰火一時湧逆惟宜先驅其風繼清痰火然後調其氣血則經絡可以漸通按此為治中風扼要之論學者所當切記至於此證部分易淆出入至大非取前賢名論佳案與良方悉心研究得其三昧不能於臨證製劑確有裁斷本集只略示門徑非所以備治法也方解千金小續命湯治卒中風欲死身體緩急口目不正舌強不能言奄奄忽忽神情悶亂諸風服之皆驗麻黃防己人參黃芩桂心芍藥甘草川芎杏仁各一兩防風一兩半附子一枚生薑五兩上十二味㕮咀以水一斗二升先煮麻黃三沸去沫內諸藥煮取三升分三服不瘥更合三四隨劑人風輕重虛實腳弱服之亦瘥恍惚者加茯神遠志骨節疼煩有熱者去附子倍芍藥外臺加白朮一兩石膏當歸各二兩無防己風之傷人者皆帶嚴寒肅殺之氣而來中風有似傷寒而甚於傷寒以本元早虧邪風直犯無禁又與內壅之痰涎表裡糾結其勢甚劇故加人參於麻黃桂枝兩方中以發越在表之邪以附子直入少陰搜逐在裡之邪戡定禍亂其要在此余如川芎黃芩防風防己不過為麻黃之佐使以祛標熱轉氣機耳徐洄溪謂千金小續命湯為中風之主方因證加減變化由人而總不能捨此以立法按此方治有六經之形證他書附有易老加減法然總須審辨虛實寒熱宜與不宜斟酌加減未可以原方漫試也三生飲治中風猝倒痰氣上壅昏不知人並口眼喎斜半身不遂生南星一兩生川烏去皮生附子去皮各五錢木香五錢每服一兩加人參一兩煎風為陽邪風中無寒不甚傷人惟風中挾寒害始劇矣寒輕而在表者宜發汗以逐邪寒重而入里者非溫中補虛終不可救南星烏附大辛大熱而又不炮不制則其剛鋭之氣足以摧堅陷陳又恐驟入而邪或拒佐木香以導之正虛而倒戈可慮益人參以駕之斯寒去而陽回陽回而風熄今之畏事者用烏附數分必制熟而後改用又以芩連監製之安能換回如此危證哉祛風至寶膏治諸風熱防風二兩白朮一兩半芍藥二兩半芒硝五錢石膏一兩滑石三兩當歸二兩半黃芩一兩甘草二兩大黃五錢連翹五錢川芎三兩半麻黃五錢天麻一兩山梔子五錢荊芥五錢黃柏五錢桔梗一兩薄荷五錢熟地黃一兩羌活一兩人參一兩全蠍五錢細辛五錢黃連五錢獨活一兩上為細末煉蜜丸彈子大每服一丸細嚼茶酒任下臨臥服此即防風通聖散加以熟地黃益血人參益氣黃柏黃連除熱羌活獨活天麻全蠍細辛去風按通聖散可治多病本河間斟量之妙此更致廣大而盡精微洵如喻氏所謂中風門中不可移易之專方也陳修園陸九芝皆極重此方修園與風引湯互服九芝適與其體相宜皆不可為訓不知至實膏主風熱三生飲主風寒兩方正相反照用昏有當能以意為愛憎又張石頑以三生飲為中風破的之方與續命湯為犄角愚則謂三生治臟續命治經治絡至寶治經治府三生熱而至寶寒續命則寒熱兼有録此三方中風大意已見拙擬本集分部極嚴此風有寒熱而隸於一門者以病名中風雖有寒熱一風字概之不能隱綱而揚目非自亂其例也余類此者仿此寒集說此所謂寒專主傷風之寒甚於風者傷風本一證而區為兩門猶仲景於傷寒而分標中風傷寒兩名也徐洄溪云惡風未有不惡寒者鄒潤安云寒非風何以能及人之身風非寒何以能中人之衛風與寒一而二二而一者也觀此兩說可知寒之不離乎風別有中寒門列下故以此為傷風之寒云拙擬傷寒非不兼風以寒重而名傷寒傷風非不兼寒以風重而名傷風二病正相對待桂枝可療傷寒之風麻黃即可療傷風之寒雖傷風之寒不如傷寒之重而寒甚於風則有之其寒同則其宜麻黃亦同所慮病輕藥重轉蒙其害耳愚每以麻黃湯加減麻黃用二三分輒效古方固不在墨守也拙擬傷風咳嗽若邪伏肺系者竟非麻黃不解喻氏云風寒外束宜華蓋散但華蓋散內有桑皮仲景謂風寒勿取金匱王不留行散方誠能引邪深入永無愈期喻氏殆未察耳拙擬用桂枝而不能驅風用麻黃而反以增熱甚至變不可言豈仲景之過歟果能研求而得其妙理更無古方足以困我故為學者導先路必當以此二方冠首春夏秋三時天有非時暑寒感冒之者謂之寒疫實非疫也其證頭痛發熱惡寒無汗治宜辛溫解表與傷寒略同方解麻黃湯治寒傷太陽脈浮緊頭身腰骨節俱痛發熱無汗惡風而喘麻黃三兩去節桂枝二兩甘草一兩炙杏仁七十個去皮尖上四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗不須飲粥余如桂枝法將息足太陽之脈上際巔頂而下達腰足而寒之為氣足以外閉衛陽而內郁營血故其為病有頭痛發熱腰痛骨節痛惡風無汗而喘之證然惟骨痛脈緊無汗為麻黃的證其餘則太陽中風亦得有之學者不以骨痛脈緊無汗為據而但拘頭痛發熱等證必致發非所當發矣人之傷於寒也陽氣鬱而成熱皮膚閉而成實麻黃輕以去實辛以散寒溫以行陽杏仁佐麻黃達肺氣泄皮毛止喘急王好古謂其治衛實是也然泄而不收升而不降桂枝甘草雖曰佐之實以監之耳葉天士云太陽傷寒治之未有無汗而愈者余見南濠蔣姓女年可二十病在第九日六脈浮緊有力起自頭痛太陽無疑但經水適來狂言不止余曰此名熱入血室前醫不發汗之故如已發汗過第七日愈矣今亦無妨服余藥數劑交過二十一日必愈後果然然愈則愈矣此女精神大損元氣大虧不用麻黃一盞誤人若此觀此則南方非絶無麻黃證可知云一盞則不在多用又可知矣桂麻二湯仲景於可與不可與辨之至精誨之至詳又兩方皆有監製皆令微汗其慎重何如學者念諸三拗湯治寒邪傷肺咳嗽喘急麻黃不去節杏仁不去皮尖甘草生上各等分水煎服麻黃留節發中有收杏仁留尖取其發留皮取其澀甘草生用補中有散也此以麻黃湯去桂枝而三味與仲景法相拗故名表如不實只須解散肺中寒邪變峻劑為平劑思亦巧矣太陽主一身之外衛而皮毛為肺之合故二經之病往往互見勿執此為肺家專藥也拙擬再造散治寒傷太陽頭痛項強發熱惡寒汗之而汗不出陽虛故也此散主之人參黃耆桂枝甘草附子炮細辛羌活防風川芎生薑煨大棗擘加炒芍藥一撮煎夏加黃芩石膏汗後表已不實不必再泄其表無汗由於陽虛不宜第逐其邪用參耆甘棗補中益氣而轉以姜辛附子散寒羌活防風驅風又桂枝和營衛川芎通陰陽故能陽勝而汗作汗作而病已加芍藥者發中有收又約陽藥使入里也夏加黃芩石膏則活人書用麻黃湯之法拙擬陶節庵名此為無陽證因醫多誤治遂立此方法亦本於前人録之以為用羌防等藥汗之而不汗不知其為陽虛更以麻黃繼之者進一解拙擬中寒集說中寒與傷寒猶中風與傷風有輕重緩急之分魏玉璜謂中寒者直中三陰喻氏以外寒直入少陰腎臟為中寒愚按直中寒邪手足必厥逆傷寒論太陰無厥逆魏說未允喻氏專屬之少陰則其義有可思者厥陰篇專詳厥逆是厥逆為肝病矣而通脈四逆湯治手足厥逆脈微欲絶吳茱萸湯治手足厥冷煩躁欲死則皆以為少陰病其故何也蓋少陰水臟在天為寒在地為水故寒至而腎即應之腎病者肝亦病肝病故厥逆以乙癸同源母子同氣也是故治中寒之道當審陰陽權標本有宜治肝有不宜治肝拙擬厥病甚多厥名不一不特三陰有厥即三陽亦有厥然傷寒論之厥與靈素之言諸厥有同有異中寒之厥即傷寒論之寒厥中寒而厥者病發之勢暑寒為陰邪少陰內寓君火中之為逆故發之暴且連肝而手足逆冷太陰濕土純陰之臟中之為順但能腹痛下利而已故寒邪直中之卒病肝腎有之太陰所必無也拙擬少陰中寒而厥必兼厥陰而藥之治腎治肝則有專屬按吳茱萸一物後人以為肝藥仲景亦非不謂肝藥少陰病多陰盛格陽陽格則以回陽為要惟薑附克任厥陰病多陰盛郁陽陽鬱則以伸陽為急非吳茱萸莫屬二者之不侔如是用吳茱萸而曰少陰病者以厥陰之為兼證也拙擬治少陰病之吳茱萸固肝藥治乾嘔吐涎沫頭痛之隸於厥陰則更為肝藥乃又以治陽明之食谷欲嘔則又為胃藥歟夫吳茱萸之用為疏土以伸木施力在土愈病在肝故陽明厥陰兩經皆得奏績然則吳茱萸為肝藥為胃藥何少陰病而亦以胃藥治歟不知中寒者少陰相率而為病者為肝與胃經之論寒厥也曰前陰者宗筋之所聚太陰陽明之所合觀於此而少陰病有肝胃之兼證與仲景以治胃病治肝病之吳茱萸並治少陰皆可以無惑拙擬吳茱萸為肝胃之藥故治陽明則標陽明治厥陰則隸厥陰治厥陰而為少陰兼證者則標少陰不標厥陰然則少陰之可據者何在吐利手足逆冷與煩躁欲死皆不得便謂之少陰惟吐利手足逆冷寒象已大著矣且無表邪無火劫何所激而煩躁欲死其所以煩躁欲死者腎中真陽寒邪直入而逼之受之不甘拒之不可舍少陰無此象也仲景標病名之不苟也如是拙擬少陰病至吐利手足逆冷煩躁欲死不可謂非寒邪直中而吳茱萸湯之治與四逆湯絶異其故何歟按四逆湯證絶無煩躁治不四逆而煩躁則為茯苓四逆湯茯苓是伐腎邪之物乃為煩躁而設如非陰陽相爭何事伐腎以降逆非腎尚有權何敢再伐其腎今煩躁欲死則爭尤甚爭尤甚則當先平其爭然彼為太陽病汗下之後此為少陰病吐利而兼手足逆冷腑與臟虛與實皆甚相懸又烏可以茯苓平爭然則治之奈何晝日煩躁夜而安靜者主以姜附有煩無躁者主以膽汁以姜附同躁固當以膽汁治煩則此不止一煩且有下利無干嘔吐為陰嘔為陽吐屬虛嘔屬實膽汁下咽潰散可立而待其餘傷寒諸煩躁更非其比然則此證之空要可知矣邪若不上攻則雖煩躁不至吐利逆冷邪上攻而不因吐利大虛則不至煩躁欲死是故治煩躁當先治吐利治吐利當先治上攻之邪吳茱萸生薑所以平中之邪人參大棗所以安中之正中既治而陰陽之上下紛擾者亦將罔有所據而就我範圍此扶危定傾之第一策與白通加膽汁救垂絶之命者先後為對照豈可以四逆例哉拙擬喻氏謂脈微者陽之微脈細者陽之細中寒之脈必不至細此即脈微欲絶脈細欲絶之別而其中之微旨則不可以不究焉厥逆篇列六方而用當歸者四皆以治厥吳茱萸湯治手足逆冷而獨無當歸寧能無故凡煩躁無細脈此不言脈脈必不細脈不細則病不在血而在氣可無藉於當歸然則肝藏血吳茱萸入肝顧不入血耶當歸辛中有甘治血之寒而不足少陰病煩躁欲死非血之本寒也特外寒之搏血耳吳茱萸大熱性烈能入肝逐搏血之寒而伸其陽蓋純乎以氣致力於血焉病發於腎而流及於肝藥則治在肝而效見於腎其思之精法之巧為何如且病非脈細血不足吳茱萸亦不以溫肝藏之血不謂之少陰病而誰謂信乎仲景方之毫髮無遺憾也拙擬吳茱萸為肝藥厥陰為肝病而四逆湯治厥轉無吳茱萸者曷故蓋四逆湯是純乎陽微之證陽一復而肝病自愈若吳茱萸湯之治則不徒陽微之謂已拙擬當歸四逆湯證是寒邪不止厄腎而肝罹其殃只通經溫血手足自和此真厥陰病而於少陰無與者自非中寒卒病之比故脈微脈細必當審諦拙擬萬密齊治一婦病由冒雪遠行而得萬謂昏睡不醒者寒中少陰腎也頭苦痛手足冷身僵直喉中痰響者寒中厥陰肝也與以十全大補湯去地芍加細辛半夏乾薑三劑而愈其不用吳茱萸湯四逆湯何也病非吐利自汗裡寒外熱且不煩躁於吳茱萸四逆何與而勞役虛甚邪斯湊之肝腎之氣即挾寒邪逆上變生諸證不宜專治其下施以溫經散寒補虛降痰諸法正與病合何能不效夫雨氣通於腎又有但欲寐之的據律以仲景法亦少陰病耳然而如萬氏者亦無愧良醫矣拙擬喻氏論中寒但主少陰但主脈微洵有卓識惟其疑厥陰之無卒病而陰病論中不敢及厥陰一語甚至於論類仲景各案將吳茱萸湯一法亦為汰去不知吳茱萸湯之治仲景明云少陰亦非脈細其危候與四逆諸湯正同安得非卒夫直中雲者不由他經傳變不因優遊漸漬直中即是卒中若必待仲景指出則治霍亂之脈微欲絶用四逆湯並不云雜病亦得謂霍亂非卒病乎此實喻氏千慮之一失愚故於吳茱萸之為厥陰藥吳茱萸湯之治厥陰而實為少陰病於少陰病用吳茱萸湯之所以然並引萬氏治案一則具詳其說於前以補喻氏之關云拙擬喻氏以腎藏真陽為生身立命之根所著陰病論詞旨之雄奇義理之精審古所未有實足為偏重寒涼家當頭棒喝顧謂仲景卒病論六卷亡佚則是臆造之辭觀隋書經籍志自見仲景論直中陰病實即在傷寒論中中寒而至脈微欲絶厥逆無脈煩躁欲死何一非卒遽阽危之象尚有何方不備喻氏所立諸方亦何嘗不在其中愚故仍就仲景方反覆研求得其微旨為學者隅反之助焉拙擬靈樞足厥陰氣絶則唇青金匱唇口青身冷為入臟即死夫氣絶即氣不至之謂未必真絶唇口青身冷為入臟則唇口青而身不冷為將入臟而未入臟故唇口青之證亦間有生者如馬元儀治陸濟臣中寒一案不言身冷其不冷可知且用桂附理中湯夜間連進二劑才得脈起汗收然則進藥稍緩亦必身冷而斃矣拙擬張石頑云中寒有卒然仆倒如中風者乃盛寒之氣猝犯少陰遂厥逆無脈口鼻氣冷而無痰聲由其人真陽素虛不勝陰寒厲氣雖盛暑亦有之太陽衛身之背陽明衛身之前少陽衛身之兩側而少陰在裡在下若非腠理疏豁肺脾失職寒邪雖厲何能奪門而入但其魁柄授人則尤在腎臟真陽式微不振真陽一去則萬事瓦裂此汲汲救陽不遑他顧所以為第一義也拙擬汪訒庵謂傷寒發熱中寒不發熱立言未免太渾當云少陰中寒有裡寒外熱者陰盛格陽非真熱也拙擬方解四逆湯少陰病脈沉者急溫之宜此湯按四逆湯為少陰中寒之主方而傷寒論治少陰病有兩條彼條非純屬中寒故録此條云脈沉則非脈微無脈之比而已當急溫可見是中寒雜病不言證者尤在涇云當從全書會通不可拘於一文一字之間苟無厥逆惡寒下利不渴等證未必急與溫之極是拙擬甘草二兩炙乾薑一兩半附子一枚生用去皮破八片上三味以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩通脈四逆湯治少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出甘草二兩炙乾薑三兩強人四兩附子大者一枚生用去皮破八片上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩通脈四逆加豬膽汁湯治霍亂病吐已下斷汗出而厥四肢拘急不解脈微欲絶按此方與證雖載於霍亂病篇而通脈四逆湯本治少陰中寒故彼此之證無甚出入且與白通湯之加膽汁又同以加膽汁之義必得兩方並疏故録入之拙擬通脈四逆湯原方加豬膽汁半合煎如前法去滓內豬膽汁溫服其脈即出白通湯治少陰病下利蔥白四莖乾薑一兩附子一枚生用去皮破八片上三味以水三升煮取一升去滓分溫再服白通加豬膽汁湯治少陰下利脈微者與白通湯利不止厥逆無脈乾嘔煩者服此湯脈暴出者死微續者生白通湯原方加豬膽汁一合人尿五合煎如前法去滓內膽汁人尿和令相得分溫再服無膽汁亦可上五方治少陰中寒重在溫下回陽故姜附無不用而乾薑與餘味或多用或少用或用或不用靡不有精思奧義寓乎其中學者苟默會於心真可以觸長無窮今匯參而精研之以補諸注家之不足焉姜附之並用何也諸證皆由腎臟陽虛寒邪得以直中附子補腎驅寒諸無能匹生用又能散外入之邪其必輔以乾薑者少陰寒甚必上侮及脾故用附子以斬將搴旗猶當佐乾薑以儲糧堅壁附子氣輕而乾薑以堅之又相得而效並彰通脈四逆之乾薑倍用何也下利清穀厥逆腹痛其中之寒已甚矣而外熱面赤乾嘔咽痛陽覆被逼而不返非大繕中宮以招之有望而卻走耳倍用乾薑所謂土溫則火斂也其用蔥白何也面赤由陽越陽越則情難驟抑非有性味介乎陰陽而與人身之陰陽兩不至違戾者以導之掖之則姜附從何施力少陰下利用之猶桃花湯之有石脂粳米彼為固之此為挽之蔥之為物鄒潤安所謂於死陰中得一線生機即可栽培扶植回於黍谷者其功能固獨擅也其不用何也下利用蔥所以醒陰中之陽若兼有汗出等證則陽已外散蔥復助之得無亡陽之虞腹中痛亦去之者腹痛為陰結陰結則當以芍藥之酸攻而開之不能以蔥白之辛撓而去之也其用甘草何也寒甚則虛辛以溫之即當甘以補之且辛與甘合則有調劑之長而陰乃化陽其不用何也少陰下利於太陰無與去甘草則溫下之勢捷至乾嘔而煩以膽汁導陽之不暇豈宜以甘草再緩其隆利止脈不出之用參何也利既止則營氣不至下泄得以鼓動其脈乃猶不能出則其故不由於寒而由中焦不能受氣化赤非加補五臟通血脈之人參曷能有濟其不用何也甘草專補中人參則補中而兼固表固表於汗出正宜何亦不用金匱下利用通脈四逆湯兼有汗出證蓋以外熱者陽浮於表嘔煩者氣逆於上用參則堅其外羈阻其下歸於下利亦不宜者人參為陰中之陽之藥能入陰生津生津則益陰益陰則分扶陽之力而利將不止按四逆湯若有參則名四逆加人參湯亦可見此數方之無參柯韻伯疑方有脫落蓋未之深考通脈四逆之加豬膽汁何也按霍亂用四逆湯有兩條未嘗無汗出而厥四肢拘急皆不加豬膽汁而此獨加者正以其吐已下斷而拘急不解耳吐已下斷陽若可回矣而厥如故拘急如故以白通加豬膽汁之例推之必已服通脈四逆而不應其所以不應者陰火為之拒也夫少陰當寒邪盛犯之時其陰中伏火不甘於澌滅必躍然以動動則拒陽藥而不納是故腎氣丸佐以丹皮黑錫丹佐以楝實三黃湯治手足拘急則佐以黃芩黃芩與膽汁皆少陽藥也夫膽藏於肝葉互相為用大抵火屬之膽風屬之肝陽升者膽之用多下泄者肝之用多加膽汁而不加丹楝則以清膽非以平肝又較黃芩為異類有情蓋拘急而有風則必掣痛必瘛瘲非陰爭於下陽浮於上亦不汗出而厥知其為火而非風者以此然則白通加豬膽汁之治嘔煩可不待言而自明矣拙擬論甫脫稿客有見者嫌猶未鬯厥旨然愚為明於醫理者言也必不護已試更疏之乾薑倍用之義注家多忽之不知利止脈不出用人參者加減法也倍用乾薑而即名之曰通脈乾薑實通脈之所繫其故安在壅遏營氣令無所避是謂脈營出中焦中焦既大為寒纍而利不止營氣下泄脈何從出溫中不較溫下為急乎乾薑無他所以逐纍脈之寒而脈自通也蔥白所以通陽自成無已後多主是說理非不是而語實籠侗或云入營通脈或云入陽明止利執是以譽蔥白而與姜附何異或云通上焦之陽下交於腎或云入陰迎陽而復其脈此較親切矣但謂通上焦之陽而上越之陽胡可再通謂其復脈而加蔥之故則因面赤終不免於齟齬或云通下焦之陰氣以達於上焦此語固好而又以自利而渴之文扭合一處遂成謬解或云蔥白但能通陽必加膽汁乃能入陰則並通陽之故而昧之凡此難以悉數夫蔥者葉青而辛溫莖白而辛涼葉空中而鋭末莖含汁而緊裹惟含汁緊裹性涼味辛陰中有陽陽中有陰恰似少陰中寓有真陽莖之上即空中而鋭末故其功能在上升而散非下納而斂面赤是陰格陽非陽格陰陰既格之必當使陰仍向之蔥白入陰升陰俾不格而知向陰向陽而陽自下返面即不赤然則白通湯證無面赤何為亦升其陰夫陽在上宜降陰在下宜升今少陰下利一往不返失地道上行之德非用蔥白入陰而升之徒有驅寒之姜附何益升之則與陽通故以蔥白冠首而名之曰白通通非通脈之謂也膽汁用佐姜附是為從治王太僕云甚大寒熱必能與違性者爭雄異氣者相格此訓反佐之義至精但太僕兼寒熱而言考之古方寒熱並用以治證兼寒熱者有之若治大熱之證而用大熱藥為反佐者實未之見愚蓋仍即太僕之言思之而得其故焉曰爭曰格必敢於爭敢於格非有火何能若是而甚大之熱其陰中之火已與熱為一家陰惟失其所恃大為熱侮那得有火敢與爭格治宜救陰緩則生變無反以熱藥竭陰之理然則寒證而加膽汁固所以清爭格之火愚前論為不虛矣抑又思之別録膽汁主傷寒熱渴而仲景用於少陰寒證非明於陰陽消息之微者不能有此卓識然證不至告危未肯輕加以人尿灌之亦寧無膽汁蓋以苦寒傷正慎之至也喻氏於開手用之已失仲景心法而張隱菴陳修園輩轉謂膽汁能起腎臟之精汁上資心主之血視以為通脈之要藥果爾仲景何故用於最後而必以乾薑人參先之醫不研求實理務為穿鑿將任舉一物悉可牽合誤人有甚於此者乎附子甘草人參三味前論已無餘蘊不續贅云拙擬吳茱萸湯治少陰病吐利手足逆冷煩躁欲死吳茱萸一升洗人參三兩生薑六兩大棗十二枚上四味以水七升煮取二升去滓溫服七合日三服當歸四逆湯治厥陰病手足厥寒脈細欲絶當歸桂枝芍藥細辛各三兩甘草通草各二兩大棗二十五枚上七味以水八升煮取三升溫服一升日三服吳茱萸湯已詳前說至當歸四逆湯非中寒雜病何以亦録之蓋少陰中寒非合加豬膽汁兩方參之則不知少陰病之出入少陰有厥陰之兼證非合厥陰本病之當歸四逆一方參之則不知有兼證無兼證之異且吳茱萸當歸皆為厥陰之要藥熟玩兩方則於少陰病之宜與不宜亦可知所去取矣拙擬陽極虛而中寒極重之病則當專一溫下不得以血藥旁撓之萬密齊所治之婦蓋非少陰真陽虛甚者拙擬脈微者陽虛脈細者血虛血虛而寒中之則手足厥寒非因中寒而後血虛特加脈細欲絶耳當歸溫血故以為君桂枝湯內四物協通草皆取其溫經散寒通脈非以解表細辛則因脈細欲絶邪已及腎用之以祛腎寒猶少陰病之用肝藥也此非少陰中寒故不用姜附非太陽中寒故不頭痛發熱內有久寒而加吳茱萸生薑亦以寒在肝不在腎也拙擬暑集說說文暍傷暑也傷寒論太陽中熱者暍是也故中熱即中暍中暍即中暑暑熱暍三字並無二義張潔古以動而得之為中熱靜而得之為中暑喻氏駁之云道途中暍之人豈可云靜得動靜二字止可分外感內傷動而得之是外感天日之暑熱靜而得之是避暑熱而反受陰濕風露瓜果生冷之傷觀此可知暑無動靜之分而別有動得靜得之所以然矣喻氏云六氣春主厥陰風木秋主陽明燥金冬主太陽寒水各行其政惟春分後秋分前少陰君火太陰濕土少陽相火三氣合行其事天本熱也而益以日之暑日本烈也而載以地之濕三氣交動時分時合其分也以風動於中勝濕解蒸不覺其若其合也天之熱氣下地之濕氣上人在氣交之中受其炎蒸無隙可避多有體倦神昏肌膚痱起胸肩痤出頭面癤生者矣甚則消渴癰疽吐瀉瘧痢又無所不病矣其不能淡泊滋味屏逐聲色者且以濕熱預傷金水二臟為秋冬發病之根故病之繁且苛者莫如夏月為最此種名論醫家病家皆不可不知至於暑濕名義則暑自暑濕自濕不得謂暑為濕熱合一之病觀仲景於中暍一證分白虎加人參湯治熱一物瓜蒂湯治濕不並為一方意可知矣中暑固即中熱而與溫熱病之熱則有不同內經氣虛身熱得之傷暑凡暑脈必虛故治暑必兼顧其虛白虎湯若不加人參則不可以治暑或問有據乎曰有白虎加人參湯仲景屢用於傷寒無人參之白虎湯則不一施於中暍猶不可知暑之所以為暑乎拙擬夏月人身之陽以汗而外泄人身之陰以熱而內耗陰陽兩有不足過用甘溫易竭其陰過用苦寒易亡其陽故仲景於暍病但用一甘一寒陰陽平治之劑此治暑之正病也拙擬受暑而濕甚於熱者去濕即所以去暑寒涼遏其陽氣而病者無汗亦須透表吐利者急宜和解甚則加以溫藥此治暑之兼病也治病須先識病名故綴此說以示區別夏月陰氣在內以陽氣發散於外也陰氣非寒氣不得率用熱藥若脾胃自傷寒涼則不在此例仲景白虎加人參湯喻氏謂是甘寒平治後人得其旨而推廣之厥功偉矣獨其徒徐忠可猶信東垣主蒼朮白虎之說悖師傳而改聖方不知中暍而渴急宜解熱生津蒼朮人參一燥一潤顯然違反豈東垣知暑中有濕而仲景反不知耶亦謬甚矣拙擬病有得之一日不發熱而惡寒注家或以為太陽傳經之寒邪或以為陽明自受之寒邪愚謂是陽明自受之熱邪耳上云不惡寒者以身熱汗自出也此云病有得之一日不發熱而惡寒者陽明自受之一日熱鬱於經故不汗出不發熱然不需時即熱發汗出故一日惡寒將自罷二日無不止矣不曰寒將自罷而曰惡寒將自罷義自可見即病有二字亦非間文蓋謂汗出不惡寒者其常汗不出而惡寒者熱病亦有之耳且太陽中熱之惡寒亦豈有寒邪彼汗出者由熱傷其衛熱之甚而氣虛虛氣則惡寒故治以白虎加人參湯此不汗出者由熱鬱於經熱方來而氣阻氣阻則惡寒故不待服藥汗即出而寒已雖愚創論然太陽陽明感受熱邪確有此兩種不同之候俱載於仲景書在人之精心尋繹耳拙擬內經論火熱淫勝之邪必肺先受金為土子肺熱則胃亦熱故肺胃之病往往並見其或肺甚胃微胃甚肺微則人之氣體感受有不同耳拙擬肺胃固相通矣而肺主皮毛太陽亦為腠理毫毛之應故肺與太陽又通仲景以中暍為太陽病而治則在肺與陽明其義蓋原於內經也拙擬張石頑云中暑有猝然暈倒如中風者乃酷暑之氣鼓運其痰壅塞心包故喘乏而無痰聲由其人腎水素虧不勝時燔灼也暑火二氣難分畛域本集以暑病入暑門暑即熱也凡外感之病類於暑者附之溫熱病入火門所謂伏氣之病也凡伏氣之病類於溫熱者附之說詳後火門風溫濕溫雖為外感溫病以俱有專門故不入於此冬溫者冬感非節之暖而成非伏氣也其證心煩嘔逆身熱頭痛或咳嗽自汗或咽痛下利羅謙甫云宜陽旦湯加桔梗萎蕤疫癘有濕熱燥熱之分燥熱之疫當與此參觀再詳玩溫熱經緯余師愚疫病篇有傷於勞役以致肌熱面赤煩渴引飲脈大而虛按之無力此血虛發熱所謂類中暑也東垣以當歸補血湯治之若誤服白虎湯必斃方解白虎加人參湯治太陽中熱汗出惡寒身熱而渴知母六兩石膏一斤碎綿裹甘草二兩炙粳米六合人參三兩上五味以水一斗煮米熟湯成去滓溫服一升日三服惡寒者熱氣入則腠理開開則灑然寒與傷寒惡寒不同發熱汗出而渴是表裡之熱俱熾與以石膏知母辛寒重滑之品俾表裡兼到足變炎歊為清涼而粳米甘草最與胃氣相得覆載以緩之此於陽明經中之熱已扼其吭而拊其背矣而暑傷其氣至於脈虛津傷則白虎一法尚未能養津而舒困此所以必加人參之大力乃克建消暑之懋績也拙擬一物瓜蒂湯治太陽中暍身熱疼重脈微弱由夏月傷冷水水行皮中所致瓜蒂二十個上銼以水一升煮取五合去滓頓服尤在涇以白虎加人參湯為治中暑無濕一物瓜蒂湯為治中暑兼濕較喻氏一專治熱一專治濕之說尤為允當瓜蒂苦寒能吐能下去身面四肢水氣不治其暑者水去而暑無所依即自解也此與下消暑丸香薷飲皆非本門應入之方但欲知治法之所以攸異則非連及之不足以醒目自金匱兩方並峙而孫真人和劑局又各有一方以應之本此意以擴學者之識良為有裨至香薷飲則正俗所謂暑者録之亦以辨病名也生脈散治熱傷元氣體惓懶言汗出脈虛或微喘而渴人參麥門冬五味子各等分上三味水煎服此孫真人仿白虎加人參湯之方也熱散肺氣此能補之收之熱鑠胃陰此能滋之生之然必得如方柄無他證者服之始善否則收斂邪氣入內不可不慎他如東垣之清暑益氣湯藥味龐雜依違兩可則不足取矣拙擬消暑丸治伏暑引飲發熱頭痛脾胃不和小便不利半夏一斤醋五斤煮乾甘草半斤生茯苓半斤上為末薑汁和丸勿見生水如桐子大每服五十丸熱湯送下中暑為患昏懶不醒者研末灌之立蘇此和劑局仿一物瓜蒂湯之方也彼為濕淫於表故以瓜蒂去身面四肢之水濕去而疼重失此為濕盛於裡故以半夏苓草拯脾胃之失職濕去而上下安用醋煮者醋能散水而兼泄熱亦猶瓜蒂湯寓宣發於苦寒皆功有並擅也拙擬天水散俗名六一散治傷暑表裡俱熱煩渴引飲小便不通及霍亂吐瀉膩白滑石六兩水飛甘草一兩上為細末每服三錢溫水或新汲水調下加辰砂少許名益元散加薄荷少許名雞蘇散加青黛少許名碧玉散滑石味淡性利色白入肺復以甘草使留連在上肺得行清肅之令故暑濕之邪傷上焦者為效甚速其下清水道蕩熱滲濕之功亦非他藥可及然無濕而津液少者勿服香薷飲治避暑乘涼飲冷陽氣為陰邪所遏發熱惡寒頭痛煩渴腹痛吐瀉香薷一斤厚朴薑汁炒白扁豆炒各半斤每服五錢水盞半煎八分浸冷服香薷辛溫厚朴苦溫扁豆守中皆與暑熱之旨相戾若非如方柄所列對證施之遺誤非輕香薷為陰邪閉汗夏月解表不可少之藥古方頗多但香薷外餘味可不拘要在斟酌病情以為去取焉耳拙擬澄火散即地榆散治中暑昏迷不省人事欲死地榆赤芍藥黃連青皮去白各等分上杵為散每用漿水調服三錢若血痢水煎服夏月猝倒無知由於心火暴甚暑熱乘之名曰暑風是熱生之風非外來之風也暑邪深入心臟以致昏迷不省人事證亦險矣知其煎熬陰血而以地榆赤芍黃連直清其心涼其血血熱者必鑠其肝又加青皮鋭入之氣引領三物入肝而解之藥不旁驚故效亦至捷録此以示治暑風之一則拙擬陽旦湯加桔梗萎蕤證見前說桂枝湯加黃芩一分為陽旦湯桂枝湯方見前風門冬月當寒而反溫溫則氣泄少陰失閉藏之職故昔人謂冬感溫邪在腎心煩嘔逆咽痛下利與傷寒之邪傳少陰無異何以不用少陰之藥蓋傷寒由太陽入里已無表證此則溫邪挾少陰之氣擾及心肺肌表又當寒水司令兼有身熱頭痛咳嗽自汗之太陽證自宜散之於外與以陽旦湯正為的對桔梗透肺熱萎蕤化陽邪加此二味又以佐黃芩之不逮也考活人書冬溫用萎蕤湯葉天士謂可用補中益氣帶表藥冬溫為病非一故治療亦無定法愚以羅氏所言方與證極合故録入而詳釋之拙擬風溫集說風溫一證衆說紛歧莫衷一是傷寒論若發汗已身灼熱者名曰風溫一條注家或與上條發熱而渴不惡寒者為溫病連講或本條自為講竊謂玩若發汗已四字語氣自是從上文說下否則無根即千金萎蕤湯為此條補治法其先若非伏氣發溫亦必不如是用藥當以此條與上條連講為是此一說也傷寒序例謂陽脈浮滑陰脈濡弱者更遇於風變為風溫尤在涇以前風未絶後風繼之以陽遇陽相得益熾釋之與仲景之言異此二說也陶節庵輩以素傷於風復傷於熱風熱相搏即為風溫此三說也近人以冬溫春溫吸受風溫先犯手太陰者為風溫此四說也竊嘗綜而論之第一說是誤汗後病變之名未可遂據為風溫之本病第二說何謂更遇並未指明尤氏之釋亦頗齟齬不安若云誤汗後更遇於風則仲景又何嘗有此文故序例可置不議第三說風熱相搏極是而必謂先傷後傷學者若不知活看難免刻舟求劍之弊第四說以吸受溫風為風溫風與溫不分先後雖似稍戾於古然治法實無二致此葉天士陳平伯輩論風溫皆是可取以為則也拙擬風為百病之長而無定體如天時寒冷則風從寒化而成傷寒溫暖則風從熱化而為風溫風一也而寒熱迥異若以治傷寒之法治風溫則大謬矣風溫與濕溫同為外感之溫病難經亦謂之傷寒夫溫病而冠之以風與濕此即與溫熱病有異處而風溫與濕溫又復不同皆宜審辨拙擬風溫病春月與冬季居多其證或惡風或不惡風必身熱咳嗽煩渴風溫為燥熱之邪燥則傷陰熱則傷津泄熱和陰是一定之治法陶節庵與喻氏敘風溫證俱有頭痛字葉天士云風溫有頭痛畢竟如此但使看者愈難矣外臺有風熱而無風溫其引巢氏病源云風熱者風熱之氣先從皮毛入於肺也葉天士亦謂溫邪上受首先犯肺蓋風溫即風熱非二病也拙擬千金萎蕤湯超超元著今人未敢效用張石頑於千金方衍義暨醫通兩釋是方長言不已而於孫真人所以立方之本旨似未能盡得夫今人治風溫主辛涼而古人必參以辛溫者豈今智而古愚哉殆以古人體質堅緻遇伏氣發溫必尚有餘邪欲化不化伏於肌腠經脈麻杏芎獨所以搜餘邪而絶根株萎蕤白薇為中風暴熱之專藥協石膏以涼而散之木香闢毒疫溫鬼甘草和諸藥皆不可少故以為使又恐麻杏芎獨藥性過溫故用石膏獨多此湯又能治冬溫者冬溫雖為非節之暖值太陽寒水司令不免挾有陰邪不宜專用清法合而觀之立方之旨尤顯惜張氏未經發出又喻氏以風溫為少陰厥陰病擬亦指伏氣發溫更遇於風乃其所謂少陰厥陰者則以素傷於風復傷於熱素傷於風豈亦猶伏氣之發於少陰寧能無誤乎總之萎蕤湯是治伏邪未盡之風溫伏邪未盡之風溫今不概見而古人精心之所在何可使終於封蔀而方則不録恐學者不知審辨而漫施也拙擬溫熱經緯載風溫治法甚備宜詳玩之方解萎蕤湯治風熱項強急痛四肢煩熱萎蕤三兩羚羊角屑人參各二兩蔥白切一升豉一升綿裹上五味水煎去滓內豉再煮去豉分溫三服取微汗風溫犯肺葉氏陳氏皆先以辛涼解表此用蔥豉意亦相同但其項強急痛四肢骨肉煩熱風熱相搏之勢甚劇豈輕解表邪所能了又何可援發表不遠熱之文萎蕤息風除熱功足並擅最為風溫妙藥羚羊角能療溫風注毒伏在骨間亦非他寒藥可比諸物為劑當無患病之不去矣而又加以人參者何按傷寒四五日身熱惡風頸項強者小柴胡湯主之項強原不忌參要非邪正已離或虛多邪少亦不輕用故桂枝湯加人參必著其脈曰沉遲此不言脈則以風溫證非陰液素虧溫邪不至直犯陰液素虧辛溫藥所以切禁人參益陰生津正治其受病之原又與萎蕤羚羊角為伍能扶正以驅邪不至助邪以化熱藥止五味而選之至精施之至當有如是至項強為太陽證而非不幹肺肺與膀胱原有相通之理說詳暑門亦足見風溫證雖屬太陽而神葛根麻黃之治則相去懸絶矣録此一方蓋以補葉氏陳氏之闕云拙擬濕集說濕為陰邪遇陽虛之體縱感受日久不至化熱故仲景於寒濕無專方以濕本毗於寒也若兼熱則為熱濕不得第以濕名拙擬葉天士云寒不能生濕因濕而為寒者有之又云但有濕而不蒸熱當於治濕藥中加熱藥以宣散利導之可謂得仲景真諦矣濕分內得外得霧雨水濕或傷或中得之於外酒肴生冷恣啖無節得之於內外屬太陽內屬太陰或少陰治之不早鬱而成熱則變狀多矣中濕者脈沉若風濕則脈浮有風無風以此別之濕在上在外者宜微汗以散之在下在內者宜燥之或利小便此大法也傷於濕者下先受之上受之濕偶有之耳下受之濕則坐臥踐履有難避而易受者蓋雨氣通於腎腎感濕即應若腎之陽又虛則更不得而拒之所以先受久則漸及於上金匱腎著湯即治下濕之一證拙擬濕上甚而熱喻氏以金匱痙病脈如蛇與鼻塞內藥鼻中兩條當之按下一條確是濕上甚之證上一條則仲景明云痙病且著其風強險惡之狀不當指為上甚之濕治上甚之濕以局方羌活勝濕湯為佳然並不治痙即足寒亦當更詳其因未可以此漫施也拙擬霧傷皮腠濕流關節夫濕流必有所止關節其止所也仲景於關節疼痛小便不利大便反快者便利其小便則小便利者舍微汗亦無治法鄒潤安云關節之大者無如膝而又最近於腹濕既痹於此勢不能下又不能升與其逐而下之仍無出路莫若就近使上於腹或從小便或從汗出而解大豆黃卷能使濕升而治筋攣膝痛據此則豆卷為濕流關節之要藥愚意秦艽薏苡牛膝松節萆薢獨活海桐皮皆可酌加拙擬方解瓜蒂散證見下解瓜蒂一分熬黃赤小豆一分煮上二味杵為散以香豉七合煮取汁和散一錢匕溫服之不吐者少加之以快吐為度而止按金匱濕家病內藥鼻中則愈一條內鼻之藥未載後賢謂是瓜蒂散之屬瓜蒂散若以散嗅則水從鼻出或單用瓜蒂燒灰存性以少許吸鼻中亦極驗寒濕在上則清陽被郁身疼頭痛鼻塞者濕上甚也發熱面黃煩喘者陽上郁也脈大則非沉細之比復和無病則非小便不利大便反快之比是其病不在腹中而在頭療之者宜但治其頭而毋犯其腹以瓜蒂散內鼻中使黃水出而寒濕去則愈不必服藥以傷其和也腎著湯即甘姜苓朮湯治身重腰以下冷痛腹重病屬下焦由身勞汗出衣里冷濕久久得之甘草白朮各二兩乾薑茯苓各四兩上四味以水五升煮取三升分溫三服腰中即溫腎受冷濕著而不去則有腎著身重腰以下冷痛腹重皆冷濕著腎陽氣不化之徵由身勞汗出衣里冷濕久久得之所謂清濕襲虛病起於下也靈樞百病始生篇然濕由外入只在腎之外府故其治法不在溫腎以散寒而在燠土以勝水甘姜苓朮辛溫甘淡本非腎藥名腎著者原其病也除濕湯治寒濕所傷身體著重腰腳痠疼小便澀少大便溏泄半夏厚朴薑汁製蒼朮米泔制各二兩藿香葉陳皮去白白朮土炒白茯苓各一兩甘草七錢炙上㕮咀每服四錢水一盞姜三片棗七枚煎七分食前溫服寒濕自下入而傷其脾延及腰體治以術甘培土蒼朴化滯苓夏導濕藿陳悅脾以和表裡薑棗運液以調營衛可謂頭頭是道喻氏云當加清熱利水藥利水可加清熱似未然拙擬寒濕不必兼受有寒云寒濕者別於熱濕也白朮酒治中濕骨節疼痛白朮一兩酒煎不拘時頓服不能飲者以水代之仲景治骨節疼痛等方多以白朮協諸辛溫之品蓋本經術主濕痹死肌有健脾開痹之能脾治則骨節之痛亦除今止用一味而以酒煎之酒行藥勢通血脈之壅且其性辛溫即謂之代姜附亦可拙擬羌活勝濕湯治濕上衝頭痛瘠痛項似拔腰似折羌活獨活各一錢藁本防風各一錢半蔓荊子川芎甘草各四分炙水煎熱服覆取似汗此下受之濕襲入太陽而太陽經氣不行故有頭痛等證與太陽受風無異然非治風而風藥獨多者何也風能勝濕濕既上衝非風不散故重用羌獨藁防又加川芎以升之蔓荊以涼之甘草以和之而風藥乃無過不及之弊拙擬按頭痛瘠痛項似拔腰似折皆內經經脈篇膀胱是動之證而至真要論太陰在泉之病亦與之同蓋濕氣淫勝則克太陽故陰受濕氣從足上行至頭歷太陽經即傷太陽之氣亦太陽病也拙擬風濕集說濕為陰邪固矣風為陽邪似可與以寒藥不知風從外入令人振寒發散本宜辛溫況風為濕錮更失其善變之性故病名風濕即寓寒於內不得疑風濕之或有寒或有熱若風為熱風濕為熱濕則是風濕之兼挾有熱熱從風化熱從濕化則是風濕之變體非本體皆不得謂之風濕風濕者非陽虛之人不能有此疾也拙擬喻氏著風濕論於仲景治風濕在扶陽之意發揮至透但以其濕為夏月之熱濕方為治夏月之陽虛未免合濕暍為一例矣夫痙濕暍三者雖有互見之因非無各判之證若云濕不離暍豈夏月有濕病而春秋冬無濕病乎且治夏月之陽虛可用桂附治春秋冬三時之陽虛反不得用桂附乎喻氏知患風濕之有陽虛不知惟陽虛而後患風濕遂致於仲景書窒而鮮通其蔽在此拙擬痙渴暍篇病者一身盡疼發熱日晡所劇者名曰風濕一條喻氏以當風取冷為在夏月實勝舊解乃其謂桂枝附子白朮附子甘草附子三湯之治悉在夏月則又大誤夫陽氣素虛之人至夏月益虛者勢必別有重證不止風濕一端蓋風濕為夏月之風濕喻氏不既云在夏為熱濕為熱風乎苟非陽虛至極之人難禁其毫不挾熱此時以桂附從事鮮不滋患然則喻氏謂三方悉用於夏月者愚則謂三方獨不用於夏月也世有知者當不河漢斯言拙擬濕家身煩疼可與麻黃加朮湯一條注家或單言濕或言濕熱兩停或言濕與寒合而成熱生煩或言濕兼寒而在表愚謂但云濕家身煩疼者省文耳按用麻黃湯加朮則必與麻黃湯證有相似之處濕家不言風而風在內亦猶傷寒不言風而非無風濕與風鬱於表而不解與麻黃湯證之無汗發熱身疼正同所不同者身煩耳身煩非心煩比心煩由於熱擾身煩則因表實風濕相搏則痛故以身煩疼連稱言濕家者著其證非傷寒不言風濕相搏身體疼煩者錯見於桂枝附子湯甘草附子湯兩證而身煩疼尤為款要所在則不得不特標之也愚以其方隸本門而不入濕門者以此拙擬觀白朮附子湯方下所繫數語而陽虛之狀宛然如繪一服覺身痹者藥力雖動其濕而陽氣未行仍難轉側三服都盡陽氣宜可振矣而蜷縮如蝟尚困而不振也且人身惟藉有陽氣手持足行始輕矯無前乃至濕痹不能轉側陽氣果安在乎況不嘔不渴脈虛浮而澀其為陽虛益無疑矣此愚點竄喻氏之論他風濕不必盡有此候而大率由於陽虛可即此以推之風無形而濕有形風氣迅而濕氣滯值雨淫濕勝之時自風易卻而濕難驅若驟汗之過汗之則風去濕存病仍不愈但使陽氣內蒸而不遽泄肌肉關節之間充滿流行則濕邪必無可容之地此金匱諸方取微汗之旨也發汗固宜微矣即利小便亦所當慎仲景於小便利者必於方中去桂以桂枝能入膀胱通小便不獨走表驅風也拙擬凡春夏之交病人汗自出肢體重痛轉側難小便不利即屬風濕由陰雨濕蒸或引飲過多所致切勿誤認為傷寒治之宜五苓散加羌活昔羅謙甫以五苓散治此疫救活甚多加羌活則張石頑之法也方解麻黃加朮湯證見前說麻黃三兩去節桂枝二兩甘草一兩炙白朮四兩杏仁七十個去皮尖上五味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗此與麻黃湯所以不同處在有濕無濕彼無濕用術則有劫液之虞此有濕則當以除濕為主故用術獨多喻氏云麻黃得術則雖發汗不止多汗則術得麻黃並可以行表裡之濕二物同用之妙有如此至證與麻黃類者治亦無二致也拙擬麻黃杏仁薏苡甘草湯治汗出當風或久傷取冷一身盡疼發熱日晡所劇名曰風濕麻黃五錢去節杏仁十個去皮尖薏苡五錢甘草一兩炙上銼麻豆大每服四錢匕水一盞半煎八分去滓溫服有微汗避風當風取冷非夏不爾方用麻黃其汗必閉故知喻氏夏月當風取涼過久而閉其汗之說為確不可易日晡所尷者即在陽明也陽明與太陰為表裡外合肌肉汗閉則肌肉痹矣身疼發熱皆所必至麻黃湯去桂枝意蓋獨重開痹無事調其營衛製劑本輕亦無藉於監製易以薏苡者痹久則濕將化熱薏苡除久風濕痹而又能入陽明清熱此豈桂枝克勝厥任者用甘草獨多不特緩麻黃之散且以汗出身熱而氣必虛非補中不可又其在夏月之一證也拙擬防己黃耆湯治風濕脈浮身重汗出惡風防己一兩甘草半兩炙白朮七錢半黃耆一兩二錢半上銼麻豆大每抄七錢匕生薑四片大棗一枚水盞半煎八分去滓溫服喘者加麻黃半兩胃中不和者加芍藥三分氣上衝者加桂枝三分下有陳寒者加細辛三分服後當如蟲行皮中從腰下如冰後坐被上又以一被繞腰下溫令微汗瘥桂枝湯治汗出惡風與此同而彼為有風無濕此則濕重於風彼為營衛不和此則衛虛絡痹衛虛故風隨汗行而不煩不疼絡痹故脈雖浮而身則重術甘培脾土所以清風濕之原黃耆助衛陽所以化風濕之氣然濕即獨重自非防己宣通經絡大逐其邪濕何由去不以汗解者衛已虛也服後如蟲行腰以下如冰是濕已不行即防己利大小便之驗也拙擬桂枝附子湯治風濕相搏身體疼煩不能自轉側不嘔不渴脈虛浮而澀若大便艱小便自利者於本方去桂枝加白朮桂枝四兩附子三枚炮去皮破八片生薑三兩切甘草二兩炙大棗十二枚擘上五味以水六升煮取二升去滓分溫三服白朮附子湯白朮二兩附子一枚半炮去皮甘草一兩炙生薑一兩半切大棗六枚擘上五味以水三升煮取一升去滓分溫三服一服覺身痹半日許再服三服都盡其人如蝟狀勿怪即是朮附並走皮中逐水氣未得除故耳此二方不外以桂枝湯出入加減證為風濕外持而衛陽不振芍藥之酸收不可用矣故必以辛溫具大力之附子協桂枝大驅陰邪生薑甘棗補中和營而後陽回而風息濕則由小便而去以桂枝既走表而並使達下故加至四兩不得不重之也若大便艱小便自利桂枝又不可用矣鄒潤安云濕流於表則大便不濡白朮健脾制水能使水在外者還入胃中而大便反濡揆以仲景此方去桂加朮之旨正相吻合或疑去桂枝則表邪仍在則朮附並走皮中逐水氣者何謂曾是仲景而專顧一面者歟拙擬甘草附子湯治風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫甘草二兩炙附子二枚炮去皮白朮二兩桂枝四兩上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者服六七合為妙骨節疼煩掣痛不得屈伸是為風濕相搏近之則痛劇惡風不欲去衣者風勝也汗出短氣或身微腫者濕勝也風濕搏之於表勢已到劇故陽不下濟而膀胱之氣不化小便不利後人治之必大開鬼門潔淨府矣乃仲景藥止四味不專資以開潔而開潔獨神斯何故歟附子驅風於肌腠骨節而大伸其陽白朮外御濕侮亦內固中氣仲景所謂二物並走皮中者斯即有似乎開桂枝宣太陽之經氣而重用之則又利小便斯即有似乎潔其不用麻杏何也病本陽虛邪入而復汗出身腫表之不實何疑施以麻杏必立致亡陽而濕之不去無論矣此三物之長所以他無與匹亦惟仲景為善用之加甘草者補中以緩外不欲以過汗桂枝多則甘草亦多並不欲其過利譬諸韶樂可謂盡美盡善者矣拙擬五苓散證見前說豬苓茯苓白朮各十八銖桂枝半兩澤瀉一兩六銖上五味為末以白飲和服方寸匕日三服多飲暖水汗出愈傷寒金匱兩書數載此方大旨不外太陽膀胱之表裡證以治風濕雖非仲景之言卻得仲景之意然必小便不利方可與之若無故竭其津液患滋大矣拙擬治痰飲用苓桂朮甘湯非不利小便而去濕然彼為脾胃之陽不足只須溫中導飲此則邪兼表裡必得外達內泄甘草太守故去之桂能溫經通脈術能逐皮間風水二物原有化表邪之長而恃以驅里濕則力尚不足故於茯苓外又加豬苓澤瀉茯苓屬陽治停蓄之水豬苓屬陰治鼓蕩之水澤瀉則於消水之中兼能通痹又以暖水出汗助術桂外達之勢斯竊踞之陰寒悉化為溫照之陽氣尚何發熱身痛之有遺患哉拙擬按張石頑於此方加羌活云治濕盛身疼小便不利體重發渴遇表邪較重之證自奏效尤速不得以廣絡疑之濕溫集說難經濕溫之脈陽濡而弱陰小而急活人書其人兩脛逆冷腹滿胸多汗頭目痛苦妄言脈陽濡而弱陰小而急治在太陰不可發汗汗出必不能言耳聾不知痛所在身青面色變名曰重暍如此死者醫殺之耳白虎加蒼朮湯主之王宇泰云凡陰病厥冷兩臂皆冷脛冷臂不冷則知非下厥上行不當以陽微寒厥論治張石頑云暑傷氣故陽脈濡弱濕傷血故陰脈小急觀此數說而濕溫之證瞭然矣活人書以濕溫為先傷濕後中暑本事方謂先受暑後受濕而兩書所用之方則同可知先受後受並不關病之出入拙擬王孟英謂濕熱即濕溫張石頑分濕熱濕溫為二而不言其所以然竊思濕熱濕溫固不能無別濕溫者濕與熱比多由內郁濕溫者暑濕相搏多由外感內郁者徐外感者暴然此在初發之時則然逮其變化往往彼此互見故孟英之言亦未為盡失也拙擬濕熱病屬陽明太陰居多中氣實則病在陽明中氣虛則病在太陰而大便之溏硬即因之脾惡濕夏月濕熱相蒸多有發黃之候然與傷寒瘀熱發黃卻有不同彼屬熱多其色明亮此屬濕多其色黯晦仲景論濕與風濕皆屬毗於寒之證故發熱身色如薰黃並不以茵陳蒿湯主之與茵陳蒿湯之治濕熱發黃絶不相混即其明證王孟英創為仲景濕溫篇而以仲景濕風濕之論入之方則不録豈仲景之誤治耶亦未識濕風濕與濕溫之大不侔矣拙擬羅謙甫謂仲景瀉心湯諸方取治濕熱最當愚則曾遇是證其人素多痰濕又中暑邪遂胸滿氣逆勢極險惡用生薑瀉心湯去乾薑加薑汁竹瀝立見奇效洵謙甫之善用仲景方也拙擬濕溫證當以活人書為準濕熱證可熟玩溫熱輕緯葉氏薛氏諸篇本集不分列兩門者以二證原不相徑庭也濕溫一證即藏疫癘在內一人受之則為濕溫一方受之則為疫癘若燥熱之疫則與此大異方解白虎加蒼朮湯治濕溫多汗余詳前說知母六兩石膏一斤甘草二兩炙蒼朮白粳米各三兩上藥銼如麻豆大每服四大錢水一盞半前至八分去滓取六分清汁溫服暑濕相搏為患而陽則上衛陰則下沉故腹為之滿頭為之痛脛為之冷昏其神則妄言泄於肌則多汗以知母石膏之苦辛寒清暑蒼朮之辛溫雄烈燥濕甘草粳米之甘平補中藥止五味效如桴鼓之應洵治濕溫之第一神方也拙擬茵陳蒿湯治瘀熱在裡頭汗出身無汗腹滿小便不利渴欲飲水茵陳蒿六兩梔子十四枚大黃二兩上三味以水一斗先煮茵陳減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減病從小便去也傷寒論治陽黃用茵陳蒿湯與濕熱發黃之證無二三物皆所以泄熱祛濕而茵陳清芬四溢尤足以解鬱蒸之氣故以為君大黃力猛與梔子少用而後煮則濕熱專從小便而去矣拙擬生薑瀉心湯證見前說生薑四兩甘草炙人參黃芩各三兩半夏半斤黃連乾薑各一兩大棗十二枚上八味以水一斗煮取六升去滓再煎取三升溫服一升日三服諸瀉心湯以生薑瀉心一法為於前說最合痰濕蔽其清陽內已駸駸化熱而外暑復煽之交結為虐勢焉得不劇非姜夏之辛散不足以辟易陰霾非芩連之苦降不足以驅除痞逆乾薑於溫暑非宜以性熱而主收斂無生薑橫散之力也至人參一味表實與心煩皆忌之發熱而渴者不忌汗吐下後之心痞亦不忌下利忌之下利而兼嘔者不忌少陽之嘔亦不忌凡少陽證宜和解人參為陰中之陽之藥具燮理陰陽之能於少陽證最合故生薑瀉心湯雖利而不嘔以兼脅下有水氣而不去甘草瀉心湯以心煩而去之其他於證有非宜而亦用者則必其中有陰陽不和之故又瀉心湯以生薑冠首者重在乾噫食臭也甘草冠首者重在胃中虛也半夏冠首者重在嘔與痞也前人論人參與三瀉心湯全不切當致仲景書微義塵封數千百年矣聊附於此以發之人中黃丸大解濕熱疫癘諸毒大黃三兩酒浸人中黃蒼朮去皮麻油炒桔梗滑石各二兩人參黃連酒洗黃芩酒洗各一兩防風五錢香附薑汁拌勿炒一兩五錢上為末神麯糊丸清熱解毒湯送下二三錢附録清熱解毒湯方黃連黃芩白芍生地人參各三錢石膏羌活知母各二錢甘草錢半升麻葛根各一錢生薑二兩此方之妙全在人中黃一味以穢惡之物解穢惡之毒三黃清熱蒼防驅濕又准對病因而加以香附宣郁桔梗開肺神麯達表俾藥力無處不到更有人參領正氣以駕馭之於是撥亂而反之正矣送以湯劑者恐病急而丸緩勢不相當也然若泥定清熱解毒湯一方則於病或有未宜可別製劑以易之拙擬甘露消毒丹治發熱倦怠胸悶腹脹肢酸咽疼斑疹身黃項腫口渴溺赤吐瀉等證但看病人舌苔淡白或厚膩或淡黃是暑濕疫癘之邪尚在氣分此丹悉主之飛滑石十五兩綿茵陳十一兩淡黃芩十兩石菖蒲六兩川貝母木通各五兩藿香射干連翹薄荷白豆蔻各五兩上藥曬燥生研細末勿見火每服三錢開水送日二次或以神麯糊丸如彈子大開水化服亦可滑石茵陳為蕩熱除濕之要藥故用為一君一臣佐以芩連通射翹荷則橫解直泄各效其用菖蒲所以利竅藿香所以闢穢白蔻所以疏滯此三味在熱為從治在濕則正治方之超妙在此此葉天士治濕熱疫癘之劑當日活人之功甚大勿輕視也拙擬燥集說燥為六氣之一內經言燥淫之病之治不一而足自非燥不為病乃生氣通天論與陰陽應象論兩言秋傷於濕而不及燥喻氏謂有脫誤當是長夏傷於濕秋傷於燥按肺家熱燥之證核諸逆秋氣則太陰不收肺氣焦滿肺病者喘嗽逆氣肺熱葉焦則生痿躄之文則上逆而嗽發為痿厥及冬生咳嗽謂之秋傷於燥未為不合且土王四季經言脾主長夏斷乎不易王太僕因不明地理應六節氣候之義誤以三之氣為少陽四之氣為太陰實乃三之氣太陰四之氣少陽高士宗正之素問直解與六氣主歲主時三陰三陽之次及脾主長夏無不符合自當從高夫脾主長夏而云足太陰陽明主治是濕土王時已伏燥氣而少陽相火又即繼之此易所以言土燥萬物秋燥二字所以從火安得猶傷於濕殆長夏傷於濕秋傷於燥本句名連屬後世佚去一句而誤燥為濕未可知耳拙擬由前之說陽明介相火寒水之間秋分以前自毗於熱秋分以後自毗於寒毗於熱則有伏氣之病火剋金也毗於寒則有勝氣之病金剋木也熱燥者陽故感而即發寒燥者陰故久而積堅熱燥之治古無其方喻氏制清燥救肺湯實大開後人智慧寒燥如脅痛㿗疝之類巢氏病源以下諸書皆不以為燥而獨責之寒此在內經亦若為分別部居者清者溫之治寒燥也燥者潤之治熱燥也不然清與燥一也而治則分之寧無故哉拙擬熱燥寒燥隨乎時令之寒熱言其常耳若時應熱而反寒時應寒而反熱則變熱燥為寒燥變寒燥為熱燥固有之矣在乎臨證詳審又不得以時拘也拙擬內經之言六氣勝復看似瞭然而以勝復合之於病則解悟轉難故挽近醫家言勝復之病多涉影響夫所謂勝者我勝彼而彼受制也復者彼受制而鬱怒思復也當我之勝彼尚未復逮彼之復我已先勝所以陽明司歲或陽明司時而有肝病則為燥金勝氣若肺金自善則不值少陰少陽司歲司時未嘗受制烏得有復肺病而有復氣必當在肺金受制之後清燥救肺湯則其治為感燥即病又陽明之復治以辛溫清燥救肺湯則其中無溫藥此其不可誣者也然則謂喻氏遵經乎悖經乎邪氣反勝王注不能淫勝於他氣反為不勝之氣為邪以勝之蓋司歲司時之本氣應勝而不能以勝則發不司時之他氣反以不應勝而勝之邪氣者不應勝而勝之謂也不言病者他章詳之也下文治以辛寒佐以苦甘正喻氏之所本參之氣交變論歲金不及亦復無異但彼言五運此言六氣五運之正化為太過無復不及為對化有復復則子為母復六氣無勝則無復有勝必有復復則受制而怒復皆不容不辨耳拙擬熱氣大來火之勝也金燥受邪肺病生焉此其熱燥雖有輕重之分而肺必先傷則同燥氣初感無遽及胃與大腸者拙擬沈目南吳鞠通陸九芝三家皆好訾議喻氏而已實憒憒沈吳但知燥為次寒而不知燥亦有熱知燥有勝氣復氣而不知燥有邪氣反勝之病沈以諸氣憤郁諸疾喘嘔盡屬內傷吳不知復氣之非感而即發並復有二義又以杏蘇散桂枝湯治風寒之方改名之曰治燥皆堪一噱陸則泥於病機十九條之不言燥遂謂燥必由他病轉屬將經言燥淫之病一概抹煞又不知燥氣之不先傷陽明可謂憒憒之甚者矣拙擬喻氏方固至妙而於燥有寒熱之分似不甚究燥為火氣之餘原自夏來乃謂秋不遽燥如其說必天降繁霜地凝白滷而始燥矣正當有寒燥之病伺以制方則治熱燥於是欲圓其說而引脈要之言並以十月之溫為金位之下火氣承之不知金亢既有火制何待又治金病新秋而得數脈豈非即熱燥之根源其方治諸氣憤郁諸痿喘嘔憤郁者肺家怒復之情痿喘者肺家被克所致皆極合經旨惟嘔究屬胃病雖於胃熱之嘔非不可治而改屬上為屬肺其如嘔之非肺病何凡此皆喻氏之微疵不能為諱者也拙擬寒燥既當求之於寒矣熱燥而熱重如可用承氣湯白虎湯者亦不以燥證名惟不至於寒而亦非大熱隨感而發者始為燥病始宜施以喻氏之方然則所治實輕病耳醫家多贊之何也曰正以輕病而古多忽之有關秋燥之一氣喻氏發之其翼經覺後之功大矣拙擬勝氣之燥病見於肝者當治其肝或清肺以除燥本邪氣反勝之燥病則但病救肺不必旁涉燥之為病如皮膚皴揭精血枯涸痿痹消渴之類不勝枚舉多由內傷所致應歸別論方解清燥救肺湯治諸氣憤郁諸痿喘嘔桑葉經霜者得金氣而柔潤不凋取之為君去枝醒淨葉三錢石膏煅稟清肅之氣極清肺熱二錢五分甘草和胃生金一錢人參生胃之津養肝之氣七分胡麻仁炒研一錢真阿膠八分麥門冬去心一錢二分杏仁泡去尖皮炒黃七分枇杷葉一片刷去毛密塗炙黃水一碗煎六分頻頻二三次滾熱服痰多加貝母栝蔞血枯加生地黃熱甚加犀角羚羊角或加牛黃喻氏云諸氣膹郁之屬於肺者屬於肺之燥也而古今治氣鬱之方用辛香引氣絶無一方治肺之燥者諸痿喘嘔之屬於上者亦屬於肺之燥也而古今治法以痿嘔屬陽明以喘屬肺是則嘔與痿屬之中下而惟喘屬之上矣所以千百方中亦無一方及於肺之燥也即喘之屬於肺者非表即下非行氣即瀉氣間有一二用潤劑者又不得其肯綮總之內經脫誤秋傷於燥一氣指長夏之濕為秋之燥後人不能更端其說置此一氣於不理即或明知理燥而用藥夾雜茫無定法今擬此方命名清燥救肺湯以胃氣為主土為金之母也天門冬雖能保肺而味苦氣滯恐反傷胃阻痰故不用知母能滋腎水清肺金亦以苦而不用至如苦寒降火正治之藥尤在所忌蓋肺金自至於燥所存陰氣不過一線償更以苦寒下其氣傷其胃其人尚有生理乎誠仿此增損以救肺燥變生諸證如沃焦救焚不厭其頻庶克有濟耳此治肺家熱燥之憤郁與喘與咳最為中肯痿則肺痿之熱者可治肺冷之痿則否嘔雖非肺病而以治熱嘔亦得喻氏欲補病機之關而不改其文故即以此兩言為方柄切勿認諸為統詞而誤施於他證愚增之以咳者病機不言咳而經固有之且正合此方也拙擬土為金母肺主降降即入胃故肺熱者胃亦熱桑葉石膏枇杷葉能清肺胃之熱而解之於上燥必傷陰人參胡麻麥冬阿膠益陰而潤液佐以杏仁通肺絡甘草和胃氣清燥之源善燥之後而鬱者達逆者順枯者滋矣拙擬加減桑菊飲治秋燥令行餘熱轉盛喘逆咳嗽口乾微渴杏仁錢半去皮尖研霜桑葉錢半薄荷葉四分連翹一錢黃菊花錢半生甘草五分生石膏二錢焦山梔一錢甜水梨肉三錢水二杯煮取一杯日二服此吳鞠通仿喻氏之方以辛涼輕劑治外感秋燥之喘咳秋燥輕病何煩復出惟喻氏選用仲景復脈湯中五物泄邪而即重補其陰意在急救此則但取清燥燥除而肺自和蓋其病尤輕也拙擬原方用杏桑荷翹理肺家之淺邪極合至苦梗則氣已上逆不宜再提咳嗽亦忌葦根止渴是啓水精上滋此證不必乞援於水二味於泄邪潤液均無所取愚故刪之而加以石膏梨肉山梔石膏解飢而尤除胃熱梨肉協菊花甘草清而帶補亦略有麥冬阿膠之益山梔則搜餘邪而驅之於下也拙擬火集說火分君相君火少陰相火少陽少陰者足少陰也而手少陰寓焉地二生火火生必於陰故手少陰雖為君主之官而其火則根於腎與腎中之火相感應傷寒少陰病所以必心煩以心為君火者不知其靜而坐鎮有南面之德者腎也非心也少陽者足少陽也而手少陽寓焉膽脈循頸至肩出入三焦之路故膽火動而三焦之火亦無不動以君心不主運而少陽行君之令佐以木火故名相火以相火為天火者只見其勃發之跡而不知膽藏於肝肝固同源於腎也拙擬歲火太過上臨少陰少陽少陰少陽之為火無異少陰少陽司天皆病本於肺其淫勝之病無異又內經論生化每舉寒暑燥濕風五氣而不及火是知暑與火雖二而一者也雞峰普濟方論外感諸疾而不分暑火其亦有見於此矣拙擬少陰為二之氣故少陰所至為暄少陽為四之氣故少陽所至為炎暑暄者溫也暑者熱也然溫亦可謂熱熱亦可謂溫如病溫虛甚死溫該乎熱也人之傷於寒為病熱熱該乎溫也暑以氣言則猶之溫熱若以病言則但可謂暑而不可謂之溫熱如汗出喘喝氣虛身熱必明著其暑狀示不與溫熱同也所以然者溫熱病是伏氣所發有發於陰有發於陽難以的指暑氣隨感而發必先傷手太陰此皆經之鑿鑿可證者仲景所以別出暍病篇不與溫病同論今分暑與溫熱為兩門暑入暑門已見於上溫熱則屬之火而以備火之一氣云拙擬火原不僅有溫熱病但非感證例不收入感證之暑已隸於暑門又有何者可隸於火溫熱非火之甚者乎雖非感而即發要必溫發於溫候熱發於熱候與傳經之先有他病者不同以此與暑門區分畛域庶幾指歸各定伏氣之說發於仲景實與內經符合喻氏以春溫為伏氣夏暑非伏氣金鑑亦以後夏至日之病暑為隨時而病不知上文病傷寒而成溫已明示伏氣矣病暑即謂病熱非指身熱氣虛之暑病也喻氏論不藏精之義極精即以其言春夏之病皆起於冬核之豈非熱病亦由冬不藏精所致至吳鞠通著溫病條辨而全不及伏氣之病竟似古有伏氣而今無伏氣其師法葉氏而於葉氏所謂春溫以黃芩湯為主方者亦悖之不顧真可怪異拙擬伏邪發於春為溫病發於夏為熱病言其常也然春時亦有熱病夏日亦有溫病溫者熱之輕熱者溫之重故古人往往互稱傷寒之邪自太陽遞入三陰伏氣溫熱自三陰傳出三陽太陽病發熱而渴不惡寒者為溫病夫不惡寒而渴非太陽病而云太陽病者以冬月伏藏之邪感春令少陽之氣由內而發其始固太陽也寒閉成熱熱鑠其液故發而即渴表無邪郁表裡俱熱故不惡寒延至三五日或腹滿或下利黃芩湯是正治之方若因外邪先受引動在裡伏熱則宜先以辛涼解其新邪繼進苦寒以清裡熱黃芩湯治太陽少陽合病或謂傷寒合病或謂溫病合病周禹載更謂是伏氣而非合病按黃芩一物治少陽伏氣固為恰合但下利可不藉甘棗嘔亦不宜姜夏詳見後解仲景斷不如是之疏竊謂其方於傷寒合病為切然治溫病豈可不主黃芩即熱病亦不能捨此一物加減隨宜而不執其方斯可矣拙擬白虎湯之治或以為府病或以為經病按表裡俱熱四字是用白虎湯之把鼻石膏一味善解肺胃之熱兼走表裡謂之經府俱病亦可拙擬傷寒論主白虎湯有二條一傷寒脈浮滑一傷寒脈滑而厥主白虎加人參湯有三條一傷寒無大熱一傷寒脈浮發熱一傷寒若吐下後沈堯封王孟英以為中暍他家則主伏氣然則溫熱之伏氣與外感非絶不可通亦可見矣溫熱病用辛溫發汗多致不救然有宜辛涼解散者蓋伏邪自內達外熱鬱腠理之時若不得外泄必還入里而成可攻之證益元散加蔥豉薄荷即發汗之妙劑或酌加神麯浮萍川貝母亦佳王孟英云伏氣溫病自里出表先從血分而後及於氣分故起病之初往往舌潤無苔其伏邪重者初起即舌絳咽乾甚有肢冷脈伏之假象亟宜大清陰分繼必厚膩黃濁之苔漸生更有伏邪深沉不能一齊出外者雖治之得法而苔退舌淡之後逾一二日舌復干絳苔復黃燥正如剝蕉抽繭層出不窮不比外感溫邪由衛及氣自營而血也秋月伏暑證輕淺者邪伏膜原深沉者亦多如此此理不發自孟英而孟英言之綦詳故備録之雖與辛涼散解之旨頗異然伏氣之發原無定處難拘一轍難經云溫病之脈行在諸經不知何經之動各隨其經所在而取之此可為治溫熱病之法矣拙擬溫熱病其脈洪大有力此陽證見陽脈也可治若脈來沉細微小此陽證見陰脈也必死凡溫熱病若發於三陰脈微足冷者多難治但熱無寒之溫瘧是伏氣為病宜與溫熱同論其餘雖亦伏氣而其始受之因不一例不收入長夏受暑過夏而發者名伏暑霜未降者輕霜既降者重冬日尤重不入暑門者以與伏氣為類也方解蔥豉湯治病初起頭痛身熱脈洪蔥白一握香豉三合上二味水煎入童子小便一合日三服葛稚川云凡初覺頭痛身熱脈洪一二日便以蔥豉湯治之按此可知其為熱邪非寒邪在陽明不在太陽何則寒邪因惡風惡寒此但言身熱寒邪當脈數脈緊此則以脈洪證以仲景所謂傷寒三日陽明脈大若合符節凡虛人風熱及伏氣發溫初起時猝難辨識者與以此湯最宜蔥白辛涼啓陽氣外達淡豉苦寒散陰氣上逆邪正不使相干而陰陽兩無所傷斯為溫熱病發汗至穩之方拙擬溫邪之發陰必先傷設有當行解救者必兼滋陰之品於其中昔人於蔥豉湯加童便梔豉湯加地黃麥冬皆此意也黃芩湯證見前說黃芩三兩甘草炙芍藥各二兩大棗十二枚擘上四味以水一斗煮取三升去滓溫服一升日再後一服傷寒合病其寒水之氣與陽明合者尚宜桂枝麻黃與少陽合者豈其純用苦寒甘棗姜夏為太陽而設非為少陽仲景之方無間可覓而鄒潤安謂嘔而脈數口渴者為火氣犯胃不宜加姜夏王孟英謂宜用運茹皆忘乎此方之為治傷寒太少合病也若以治溫病則鄒王之說正合然溫病下利止清熱而利自已不必以甘棗培土轉使邪滯亦不可不知拙擬傷寒厥陰篇云傷寒脈遲與黃芩湯除其熱腹中則冷不能食可知黃芩湯證之脈必數所治之熱必自里達外不治但在表分之熱佐之以芍藥者蓋欲清氣分而又泄迫血之熱非二藥並用不為功也此亦鄒說與治溫合故節録之白虎湯治陽明病脈浮滑表裡俱熱自汗出煩渴引飲或加人參三兩方見暑門白虎加人參湯石膏解肌熱泄胃火兩擅內外之能故用為君知母瀉火滋燥故用為臣佐以甘草粳米調和中宮更設煎法使苦辛寒之劑得逗留陽明而奏清肅之功自熱無不除渴無不解矣若日久氣虛必須以人參養正生津者人參又不可少白虎承氣同為陽明府病之方承氣苦寒逐熱為熱而且實者設白虎甘寒生津為熱而不實者設豬苓湯治陽明病脈浮發熱渴欲飲水小便不利豬苓去皮茯苓澤瀉滑石阿膠各一兩上五味以水四升先煮四味取二升去滓內阿膠煬消溫服七合日三服證與白虎相似而主以豬苓湯者所謂小大不利治其標也利小便何以不用五苓蓋彼由陰壅而脾虛故以桂枝通膀胱之陽即佐以白朮崇土此由陽盛而液傷故以滑石入胃除熱又必以阿膠潤液養陰此四物於兩方正為反對詎可互施至二苓澤瀉則均需以導水不妨從同然非恃有各當之主藥亦不能有益無弊也拙擬治胃熱何以不用石膏以渴飲而小便不利則有水蓄於中非滑石能於濕中蕩熱不可也拙擬詳陽明病脈浮脈熱七字所發之熱在分肉肌膚間不能於衛氣無涉衛為熱鬱所以膀胱有阻而病則在陽明渴是胃熱滑石正蕩胃熱可為陽明病之據前人多有謂邪熱在下者豈以脈浮發熱為即太陽病歟抑內發之邪尚未達於中歟殆不能無誤解也拙擬汗出多而渴者不可與豬苓湯是汗少亦尚可歟然豬苓湯本以利水若無水而口乾舌燥即使無汗亦不可與此皆仲景言外之意可體會而得者也拙擬以上三方仲景治溫熱之發於陽者甘草湯治少陰病二三日咽痛若不瘥與桔梗湯甘草二兩上一味以水三升煮取一升五合去滓溫服七合日二服桔梗湯桔梗一兩甘草二兩上二味以水三升煮取一升去滓分溫再服喉嚨少陰直脈所循少陰病二三日即咽痛明其伏邪內發急疾之至甘草大甘為土之正味能制腎水越上之火故獨用以緩之生用以清之設不差是肺竅不利氣不宣泄也以桔梗開之熱自透達但在二三日內邪熱未盛可以甘草瀉火而愈若五六日則少陰之下利嘔逆諸證皆起此法非所宜矣甘草一味徐忠可以治肺痿鄒潤安以解藥毒皆極驗正未可忽視加桔梗即後人所稱之甘桔湯如用之中病自效但勿視為咽痛通治之方拙擬豬膚湯治少陰病下利咽痛胸滿心煩豬膚一斤王孟英云以豬皮去其肉肥刮如紙薄杭人能造名曰肉鮮可以充饌上一味以水一斗煮取五升去滓加白蜜一升白粉五合即米粉熬香和令相得溫分六服下利咽痛心煩皆少陰病惟胸滿則疑於少陽不知少陰脈之支別從肺出絡心注胸中下利既泄其腎陰其虛陽之上乘者亦必因中土無權紛擾於咽喉心胸經氣所到之處以其虛而非實故胸滿不至於痛不必用攻陷之劑此時伏邪初發尚未由血及氣亦無事於苦寒傷正豬水畜而膚甘寒輕浮自能從上引下而邪熱以平然下利非濕也非加白蜜不足以潤燥益陰患見於上下則宜建中非加白粉熬香不足以悅脾振困諸家聚訟紛如似皆非允當敢為此論之質之拙擬黃連阿膠湯治少陰病得之二三日以上心中煩不得臥黃連四兩黃芩一兩芍藥二兩阿膠三兩雞子黃二枚上五味以水五升煮三物取二升去滓內膠煬盡小冷內雞子黃攪令相得溫服七合日三服心煩不得臥熱證也至二三日以上心煩不得臥則非初即屬熱矣初即屬熱者為陰虛今至二三日以上始見則為少陰伏邪寒變之熱熱耗其液也尤在涇云陽經之寒變為熱則歸於氣或歸於血陰經之寒變為熱則歸於血必不歸於氣黃連黃芩之苦合阿膠雞子黃之甘所以生陰液而除邪熱芍藥則約而納之於血也由是推之少陰口燥咽乾不用調胃承氣小承氣而獨用大承氣仲景之意亦可見矣豬苓湯治少陰病下利六七日咳而嘔渴心煩不得眠方見前伏邪發於少陰致心煩不得眠而復下利至六七日咳而嘔渴陰液之傷已甚矣此時以阿膠鹹寒入陰而滋之自是要策然愈利愈渴愈渴愈利阿膠一味詎為足恃其所以然者熱為之也亦飲為之也夫邪氣自下而上者仍須從下引而出之豬茯澤滑蕩熱而兼利濕配以阿膠之滋陰則損其有餘即補其不足一舉而收全效此足見仲景製劑之妙也拙擬詳少陰病用豬苓湯則知陽明病之用豬苓寧謂非伏邪由少陰而發此尚在血分彼則已及陽明治陽明而亦兼滋其陰者陰先傷也彼此互參其義益見即證不同而治同亦可於此得其旨矣拙擬大承氣湯治少陰病得之二三日口燥咽乾者急下之宜此湯大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝三合上四味以水一斗先煮厚朴枳實取五升內大黃煎取二升去滓內硝更上微火一兩沸分溫再服得下余勿服傷寒論此條或謂是傷寒傳經之證但少陰不由陽明傳入無傳入少陰而有陽明承氣證之理或謂是寒中少陰則咽痛有之何至二三日即口燥咽乾且以大承氣下之尤在涇云陽明居中土為萬物所歸故三陽三陰之邪皆得還入於胃而成可下之證蓋得之二三日口燥咽乾者少陰久伏之邪發之勢暴腎將涸也腎將涸則入胃而並燥其土土燥則實不得不下大承氣湯內有芒硝攻胃而即能救腎所以為的對之方也拙擬古人文辭簡質仲景云宜大承氣湯即隱寓大承氣證在內其非大承氣所有之證則為特著之或難之曰彼條腹脹不大便固宜以大承氣與之矣又何以贅為曰無少陰別證可據以陽明病之證系之於少陰明其非陽明病云爾拙擬三承氣湯無不有大黃故承氣之名當屬之大黃承氣者為血大黃固血分藥也夫血隨氣行亦血隨氣滯氣滯而血不隨之滯者是氣之不足非氣之有餘惟氣滯並波及於血於是氣以血為窟宅血以氣為禦侮遂連衡宿食蒸逼津液悉化為火此時惟大黃能搗其巢穴蕩熱除穢氣之結於血者散則枳朴遂能效其通氣之職此大黃所以為承氣也其加芒硝何也腎為胃關胃熱足以鑠腎腎熱亦耗其胃不以芒硝直入下焦軟堅潤燥關門如何能利燥屎亦安得下故小承氣無芒硝只為和胃之劑大承氣有芒硝即少陰溫病亦可與在得其意而善用焉耳以上六方仲景治溫熱之發於陰者涼膈散治心火上盛中焦燥實煩躁口渴目赤頭眩口瘡唇裂吐血衄血大小便祕諸風瘛瘲發斑發狂及小兒驚風痘瘡黑陷連翹一兩大黃酒浸二兩芒硝一兩甘草六錢黃芩酒炒一兩薄荷七錢梔子八錢上為末每服四五錢加竹葉生蜜煎硝黃得枳朴之重著則下熱因之而奪得苓梔翹荷之輕揚則上熱因之而散此承氣涼膈之所攸分也用甘草者即調胃承氣之義張潔古去大黃芒硝加桔梗以手足少陽相火俱下胸膈遊行一身之表桔梗載諸藥而上之以去胸腹六經之熱名桔梗湯余師愚又於桔梗湯加生石膏以治疫疹初起甘露飲治丈夫小兒胃中客熱牙宣齒爛目垂欲閉飢不欲食及目赤腫痛口瘡咽腫瘡疹已發未發又療脾胃濕熱黃疸腹滿或時身熱並宜服之枇杷葉熟地生地天冬枳殼茵陳麥冬石斛甘草黃芩各等分上為末每服二錢水一盞煎七分去滓食後臨臥溫服本事方加犀角名加減甘露飲此乃以散作飲者煩熱多由陰虛腎主五液胃為燥金皆喜潤而惡燥燥則火升熱亦生濕以二地二冬石斛甘草滋而補之枇杷葉枳殼清而降之更以茵陳黃芩折熱而去濕諸證無慮不平矣若渴飲尿祕則又以河間桂苓甘露飲為當方附録滑石四兩石膏寒水石各二兩茯苓澤瀉各一兩白朮豬苓肉桂各五錢為末每服三錢生薑湯或新水調下拙擬犀角地黃湯治溫熱病邪入心包絡舌絳津虧黑犀角磨汁連翹各三錢生地五錢生甘草五分上四味以水二鍾武火煎三物之八分去滓入犀角汁和服熱傳心包舌絳津虧八九日不解醫反治經寒之散之攻之熱勢益熾得此湯立效者蓋犀角靈異之物能於內外皆熱之毒悉舉上行而散連翹解客熱生地滋陰液甘草和營血專從事於心包而巨患始平固非芩連膏知輩所能越俎而代也局方此湯有丹皮赤芍無連翹甘草此為王晉三所改丹芍雖除血熱而性主攻逐下行連翹輕揚甘草甘平則適如其分而不過且以佐犀角更為調劑有情較原方自勝爾拙擬萬氏牛黃清心丸治溫熱病熱阻關竅犀牛黃二分五釐鏡面硃砂一錢五分生黃連五錢黃芩山梔各三錢鬱金二錢上研末蒸餅為糊丸如黍米大每服七八丸王晉三云此丸古有數方其義各別若治溫邪內陷包絡神昏者惟萬氏此方為妙蓋溫熱入於心包邪在裡矣草木之香僅能達表不能透里必藉牛黃幽香有情之物乃能透包絡而合神明然尤在佐使之品配合成宜萬氏以芩連山梔瀉心火鬱金通心氣辰砂鎮心神正與牛黃式好無尤是以得建奇功若調入湯劑則犀角羚羊角金汁甘草人中黃連翹薄荷可隨宜酌用至寶丹治中惡氣絶中風不語熱疫煩躁氣喘吐逆邪氣攻心神昏頭眩口乾不眠及傷寒狂語生烏犀屑生玳瑁屑琥珀研硃砂研水飛雄黃研水飛各一兩牛黃研五兩安息香一兩半為末酒研飛淨一兩熬膏用水安息尤妙龍腦研麝香研各一兩銀箔金箔各十五片研細為衣上將烏犀玳瑁為細末入余藥研勻將安息香膏重湯煮凝成後入諸藥中和搜成劑丸如桐子大蠟護臨服剖用人參湯化下三丸至五丸王晉三云此治心臟神昏從表透里之方也犀角牛黃玳瑁琥珀以有靈之物內通心竅硃砂雄黃二箔以重墜之品安鎮心神佐以龍腦麝香安息搜剔幽隱諸竅故熱入心包絡舌絳神昏者以此丹入寒涼湯藥中用之能祛陰起陽立展神明有非他藥所可及若病因頭痛而即神昏不語者此肝虛魂升於頂當用牡蠣救逆以降之又非此丹所宜輕試大黃湯療天行五六日不解頭痛壯熱四肢煩疼不得飲食大黃胃黃連心肝黃柏腎梔子肺各半兩擘上四味以水八升煮六七沸內豉一升蔥白七莖煮取三升去滓分三服忌豬肉冷水此三黃湯之變除六經之熱以上六方凡溫熱證無論外感伏氣但與方合皆可施用白虎加桂枝湯治溫瘧脈如平身無寒但熱骨節煩疼時嘔知母六兩石膏一斤甘草二兩炙粳米二合桂枝三兩上銼每五錢水一盞半煎至八分去滓溫服汗出愈溫瘧者邪氣內臟腎中至春夏而始發為伏氣外出之證寒蓄久而變熱故亦不作寒也脈如平者病非乍感故脈如其平時也骨節煩疼時嘔者熱從腎出外舍於其合而上並於陽明也白虎甘寒除熱桂枝則因其熱而達之耳
